name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: typecheck + lint + test
        run: npm run check
      - name: build all packages to JS
        run: npm run build
      - name: end-to-end pipeline smoke test
        run: npm run demo
      - name: build the zero-install browser demo
        run: npm run build:demo
      - uses: actions/upload-artifact@v4
        with:
          name: web-demo
          path: web/demo/
